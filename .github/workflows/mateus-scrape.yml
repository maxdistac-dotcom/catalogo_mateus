name: Mateus Mais produtos disponiveis

on:
  workflow_dispatch:
    inputs:
      scrape_mode:
        description: "Modo da coleta"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - no-images
          - images
  schedule:
    # 07:00 em America/Fortaleza (UTC-3). Segunda: completo com imagens.
    - cron: "0 10 * * 1"
    # 07:00 em America/Fortaleza (UTC-3). Terca a sabado: leve sem imagens.
    - cron: "0 10 * * 2-6"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mateus-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MATEUS_STORAGE_STATE_BASE64: ${{ secrets.MATEUS_STORAGE_STATE_BASE64 }}
      MATEUS_CLIENT_CODE: ${{ secrets.MATEUS_CLIENT_CODE }}
      MATEUS_TELEGRAM_BOT_TOKEN: ${{ secrets.MATEUS_TELEGRAM_BOT_TOKEN }}
      MATEUS_TELEGRAM_CHAT_ID: ${{ secrets.MATEUS_TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Select scrape mode
        shell: bash
        run: |
          MODE="${{ github.event.inputs.scrape_mode || 'auto' }}"
          if [ "$MODE" = "auto" ]; then
            if [ "${{ github.event.schedule }}" = "0 10 * * 1" ]; then
              MODE="images"
            else
              MODE="no-images"
            fi
          fi

          if [ "$MODE" = "images" ]; then
            echo "SCRAPE_ARGS=" >> "$GITHUB_ENV"
          else
            echo "SCRAPE_ARGS=--no-images" >> "$GITHUB_ENV"
          fi

          echo "SCRAPE_MODE=$MODE" >> "$GITHUB_ENV"
          echo "Modo selecionado: $MODE"

      - name: Check required secrets
        run: |
          test -n "$MATEUS_STORAGE_STATE_BASE64" || (echo "::error::Missing secret MATEUS_STORAGE_STATE_BASE64. Generate it locally from dados/storage-state.base64.txt and add it in Settings > Secrets and variables > Actions." && exit 1)
          test -n "$MATEUS_CLIENT_CODE" || (echo "::warning::Missing MATEUS_CLIENT_CODE. The scraper will use only the saved session client, if present.")

      - name: Install Playwright
        run: |
          npm install --no-save playwright@latest
          npx playwright install --with-deps chromium

      - name: Scrape Mateus Mais
        run: node scripts/mateus-scraper.mjs scrape $SCRAPE_ARGS

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: mateus-produtos-disponiveis-${{ env.SCRAPE_MODE }}
          path: saida
          retention-days: 7

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: saida

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
